name: publish

# Publish PADZE to PyPI whenever a GitHub Release is published.
# Authentication uses PyPI Trusted Publishing (OIDC): no API tokens or
# secrets are stored in this repository. See docs/RELEASING.md for setup.

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify the built distributions
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
